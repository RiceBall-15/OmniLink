# OmniLink IM System - Docker Compose
# 开发环境配置

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: omnilink-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnilink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnilink_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-omnilink}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilink"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnilink-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: omnilink-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-omnilink_dev_2024}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-omnilink_dev_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnilink-net

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: omnilink-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - omnilink-net

  # OmniLink API 服务
  im-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnilink-api
    command: ["im-api"]
    environment:
      DATABASE_URL: postgresql://omnilink:${POSTGRES_PASSWORD:-omnilink_dev_2024}@postgres:5432/omnilink
      REDIS_URL: redis://:${REDIS_PASSWORD:-omnilink_dev_2024}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - omnilink-net

  # OmniLink WebSocket Gateway
  im-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnilink-gateway
    command: ["im-gateway"]
    environment:
      DATABASE_URL: postgresql://omnilink:${POSTGRES_PASSWORD:-omnilink_dev_2024}@postgres:5432/omnilink
      REDIS_URL: redis://:${REDIS_PASSWORD:-omnilink_dev_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RUST_LOG: info
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnilink-net

  # OmniLink Worker 后台任务
  im-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnilink-worker
    command: ["im-worker"]
    environment:
      DATABASE_URL: postgresql://omnilink:${POSTGRES_PASSWORD:-omnilink_dev_2024}@postgres:5432/omnilink
      REDIS_URL: redis://:${REDIS_PASSWORD:-omnilink_dev_2024}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnilink-net

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: omnilink-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - im-api
      - im-gateway
    networks:
      - omnilink-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  omnilink-net:
    driver: bridge
