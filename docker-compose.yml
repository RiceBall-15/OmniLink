# OmniLink IM System - Docker Compose
# 开发环境配置

version: '3.8'

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: omnilink-postgres
    environment:
      POSTGRES_DB: omnilink
      POSTGRES_USER: omnilink
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnilink_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilink"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnilink-network

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: omnilink-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnilink-network

  # ============================================
  # MinIO 对象存储
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: omnilink-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - omnilink-network

  # ============================================
  # IM API 服务
  # ============================================
  im-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    container_name: omnilink-im-api
    command: ["cargo", "run", "--release", "--bin", "im-api"]
    environment:
      DATABASE_URL: postgresql://omnilink:${POSTGRES_PASSWORD:-omnilink_dev_password}@postgres:5432/omnilink
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_key}
      RUST_LOG: info,im_api=debug
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - omnilink-network

  # ============================================
  # IM Gateway 服务 (WebSocket)
  # ============================================
  im-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    container_name: omnilink-im-gateway
    command: ["cargo", "run", "--release", "--bin", "im-gateway"]
    environment:
      DATABASE_URL: postgresql://omnilink:${POSTGRES_PASSWORD:-omnilink_dev_password}@postgres:5432/omnilink
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_key}
      RUST_LOG: info,im_gateway=debug
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - omnilink-network

  # ============================================
  # IM Worker 服务 (后台任务)
  # ============================================
  im-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    container_name: omnilink-im-worker
    command: ["cargo", "run", "--release", "--bin", "im-worker"]
    environment:
      DATABASE_URL: postgresql://omnilink:${POSTGRES_PASSWORD:-omnilink_dev_password}@postgres:5432/omnilink
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,im_worker=debug
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omnilink-network

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: omnilink-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/build:/usr/share/nginx/html:ro
    depends_on:
      - im-api
      - im-gateway
    networks:
      - omnilink-network

  # ============================================
  # pgAdmin (开发环境数据库管理)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: omnilink-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@omnilink.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - omnilink-network
    profiles:
      - dev

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
  redis_data:
  minio_data:
  cargo_cache:
  pgadmin_data:

# ============================================
# 网络
# ============================================
networks:
  omnilink-network:
    driver: bridge
