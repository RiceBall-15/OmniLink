# Prometheus 配置 - OmniLink 监控
# 部署到 /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则
rule_files:
  - "rules/omnilink.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OmniLink API 服务
  - job_name: "omnilink-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["localhost:8080"]
        labels:
          service: "im-api"
          environment: "production"

  # 可以添加更多实例（集群部署时）
  # - targets: ["api-2:8080", "api-3:8080"]

  # Node Exporter（系统监控）
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]

  # PostgreSQL Exporter
  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["localhost:9187"]

  # Redis Exporter
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["localhost:9121"]
